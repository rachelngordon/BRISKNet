# Directories for input data
data:
  root_dir: "/net/scratch2/rachelgordon/zf_data_192_slices/zf_kspace"
  dataset_key: "kspace"
  split_file: "/home/rachelgordon/mri_recon/radial-breast-ddei/data/data_split.json"
  val_split_ratio: 0.2
  height: 320
  width: 320
  timeframes: 72
  total_spokes: 288
  samples: 640
  coils: 16
  eval_timeframes: 72
  eval_spokes: 4
  spf_aug: false
  weight_accelerations: false
  fpg: 36
  train_spokes_per_frame: 4
  slices: 192
  slices_to_eval: 1
  eval_frequency: 5
  flip_kspace: False
  traj_method: get_traj

# Experiment settings
experiment:
  output_dir: "/net/projects2/annawoodard/rachelgordon/experiments"
  cluster: "DSI"
  pretrained_checkpoint: '/net/projects2/annawoodard/rachelgordon/experiments/mc_36spf_overfit/mc_36spf_overfit_best_model.pth'

# DataLoader settings
dataloader:
  batch_size: 1
  shuffle: true
  num_workers: 2
  max_subjects: 300
  num_random_slices: 4
  slice_idx: 41
  slice_range_start: None
  slice_range_end: None
  slice_sampling_mode: nonenhancing
  slice_sampling_uniform_fraction: 0.6
  slice_sampling_filter_quantile: 0.3
  slice_sampling_no_replacement: true
  slice_sampling_cache_dir: /net/scratch2/rachelgordon/zf_data_192_slices/slice_sampling_cache
  slice_sampling_cache_workers: 4

# Model settings
model:
  name: "LSFPNet"
  num_layers: 3
  cascades: 2
  channels: 16
  style_dim: 128
  svd_mode: "detached_uv"
  use_lowk_dc: false
  lowk_frac: 0.125
  lowk_alpha: 1.0
  film_bounded: true
  film_gain: 0.10
  film_identity_init: true
  film_L: true
  svd_noise_std: 0.001
  lambda_L: 0.0025
  lambda_S: 0.05
  lambda_spatial_L: 0.05
  lambda_spatial_S: 0.05
  gamma: 0.5
  lambda_step: 0.1
  encode_acceleration: false
  encode_time_index: true
  kernel_size_L: [3, 3, 5]
  kernel_size_S: [3, 3, 3]
  activation_checkpointing: false
  checkpoint_use_reentrant: false
  optimizer:
    name: "Adam"
    lr: 0.00005
    weight_decay: 0.0
    b1: 0.9
    b2: 0.999
    eps: 0.000000001
  losses:
    adj_loss:
      weight: 1
    use_ei_loss: True
    mc_loss:
      weight: 1
      metric: "MAE"
    ei_loss:
      metric: "MSE"
      temporal_transform: "arrival_shift_enh_scale"
      spatial_transform: "diffeo"
      rotate_range: 60
      weight: 10000
      warmup: 20
      duration: 5
      subsample_ratio_min: 0.7
      subsample_ratio_max: 0.95
      warp_ratio_min: 0.6
      warp_ratio_max: 0.95
      # --- arrival_shift params ---
      arrival_shift_max_shift: 1
      arrival_shift_percentile: 0.95
      arrival_shift_baseline_k: 2.0
      # --- enh_scale params ---
      enh_scale_min: 0.85
      enh_scale_max: 1.15
      pre_contrast_baseline: "m_seconds"
      baseline_seconds: 20.0
      total_seconds: 150.0
      no_grad: false
    # Operator-level (binning) equivariance (DDEI-ish).
    rebin_loss:
      enable: true
      weight: 10000
      factor: 2
      metric: "MSE"
      time_index_mode: "scaled"
  norm: "both"


# Training settings
training:
  epochs: 500
  save_interval: 1
  plot_interval: 20
  device: "cuda"  # or "cpu"
  multigpu: True
  lr_schedule:
    min_lr_factor: 0.6
    warmup_epochs: 10
  edge_time_index_sampling: true
  curriculum_learning:
    enabled: False
    phases:
      - name: "Phase 1: Moderate Accelerations"
        start_epoch: 1
        train_spokes_range: [16, 24, 36]
        eval_spokes_per_frame: 16       # Validate on the highest acceleration in this phase
        eval_num_frames: 18 # (16 * 18 = 288 total spokes, assuming a fixed total spoke budget)
      - name: "Phase 2: Higher Accelerations"
        start_epoch: 2
        train_spokes_range: [8, 16, 24, 36] # Introduces 8 spokes/frame
        eval_spokes_per_frame: 8
        eval_num_frames: 36 # (8 * 36 = 288 total spokes)
      - name: "Phase 3: Ultra-High Accelerations"
        start_epoch: 3
        train_spokes_range: [2, 4, 8, 16, 24, 36] # Introduces 2 and 4 spokes/frame
        eval_spokes_per_frame: 2
        eval_num_frames: 144 # (2 * 144 = 288 total spokes)

evaluation:
  num_samples: 15
  simulated_dataset_path: "/net/scratch2/rachelgordon/dro_dataset_frontpad"
  chunk_size: 36
  chunk_overlap: 18
  rescale: False
  val_noise_level: 0.05

debugging:
  calc_step_0: True
  calc_step_0_val: True
  enable_gradient_monitoring: true
  monitoring_interval: 5