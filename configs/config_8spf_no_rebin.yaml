data:
  coils: 16
  dataset_key: kspace
  eval_frequency: 5
  eval_spokes: 8
  eval_timeframes: 36
  flip_kspace: false
  fpg: 36
  height: 320
  root_dir: /net/scratch2/rachelgordon/zf_data_192_slices/zf_kspace
  samples: 640
  slices: 192
  slices_to_eval: 1
  spf_aug: false
  split_file: /home/rachelgordon/mri_recon/radial-breast-ddei/data/data_split.json
  timeframes: 36
  total_spokes: 288
  train_spokes_per_frame: 8
  traj_method: get_traj
  val_split_ratio: 0.2
  weight_accelerations: false
  width: 320
dataloader:
  batch_size: 1
  max_subjects: 300
  num_random_slices: 4
  num_workers: 2
  shuffle: true
  slice_idx: 41
  slice_range_end: None
  slice_range_start: None
  slice_sampling_cache_dir: /net/scratch2/rachelgordon/zf_data_192_slices/slice_sampling_cache
  slice_sampling_cache_workers: 4
  slice_sampling_filter_quantile: 0.3
  slice_sampling_mode: nonenhancing
  slice_sampling_no_replacement: true
  slice_sampling_uniform_fraction: 0.6
debugging:
  calc_step_0: true
  calc_step_0_val: true
  enable_gradient_monitoring: true
  monitoring_interval: 5
evaluation:
  chunk_overlap: 18
  chunk_size: 36
  num_samples: 15
  rescale: false
  simulated_dataset_path: /net/scratch2/rachelgordon/dro_dataset_frontpad
  val_noise_level: 0.05
experiment:
  cluster: DSI
  output_dir: /net/projects2/annawoodard/rachelgordon/experiments
  pretrained_checkpoint: /home/rachelgordon/mri_recon/radial-breast-ddei/output/ei_diffeo_36spf/ei_diffeo_36spf_best_model.pth
model:
  activation_checkpointing: false
  cascades: 2
  channels: 16
  checkpoint_use_reentrant: false
  encode_acceleration: false
  encode_time_index: true
  film_L: true
  film_bounded: true
  film_gain: 0.1
  film_identity_init: true
  gamma: 0.5
  kernel_size_L:
  - 3
  - 3
  - 5
  kernel_size_S:
  - 3
  - 3
  - 3
  lambda_L: 0.0025
  lambda_S: 0.05
  lambda_spatial_L: 0.05
  lambda_spatial_S: 0.05
  lambda_step: 0.1
  losses:
    adj_loss:
      weight: 1
    ei_loss:
      arrival_fraction: 0.15
      arrival_method: threshold
      arrival_shift_baseline_k: 2.0
      arrival_shift_max_shift: 1
      arrival_shift_percentile: 0.95
      baseline_seconds: 20.0
      duration: 40
      enh_scale_max: 1.15
      enh_scale_min: 0.85
      enh_scale_start: arrival
      metric: MSE
      no_grad: false
      pre_contrast_baseline: m_seconds
      rotate_range: 0
      spatial_transform: diffeo
      subsample_ratio_max: 0.95
      subsample_ratio_min: 0.7
      temporal_transform: arrival_shift_enh_scale
      total_seconds: 150.0
      warmup: 0
      warp_ratio_max: 0.95
      warp_ratio_min: 0.6
      weight: 10000
    mc_loss:
      metric: MAE
      weight: 1
    rebin_loss:
      enable: false
      factor: 2
      metric: MSE
      time_index_mode: scaled
      weight: 10000
    use_ei_loss: true
  lowk_alpha: 1.0
  lowk_frac: 0.125
  name: LSFPNet
  norm: both
  num_layers: 3
  optimizer:
    b1: 0.9
    b2: 0.999
    eps: 1.0e-09
    lr: 0.0001
    name: Adam
    weight_decay: 0.0
  style_dim: 128
  svd_mode: detached_uv
  svd_noise_std: 0.001
  use_lowk_dc: false
training:
  curriculum_learning:
    enabled: false
    phases:
    - eval_num_frames: 18
      eval_spokes_per_frame: 16
      name: 'Phase 1: Moderate Accelerations'
      start_epoch: 1
      train_spokes_range:
      - 16
      - 24
      - 36
    - eval_num_frames: 36
      eval_spokes_per_frame: 8
      name: 'Phase 2: Higher Accelerations'
      start_epoch: 2
      train_spokes_range:
      - 8
      - 16
      - 24
      - 36
    - eval_num_frames: 144
      eval_spokes_per_frame: 2
      name: 'Phase 3: Ultra-High Accelerations'
      start_epoch: 3
      train_spokes_range:
      - 2
      - 4
      - 8
      - 16
      - 24
      - 36
  device: cuda
  edge_time_index_sampling: true
  epochs: 90
  lr_schedule:
    min_lr_factor: 0.2
    warmup_epochs: 5
    warmup_mode: cosine
  multigpu: true
  plot_interval: 20
  save_interval: 1