data:
  coils: 16
  dataset_key: kspace
  eval_frequency: 5
  eval_spokes: 36
  eval_timeframes: 8
  flip_kspace: false
  fpg: 36
  height: 320
  root_dir: /net/scratch2/rachelgordon/zf_data_192_slices/zf_kspace
  samples: 640
  slices: 192
  slices_to_eval: 1
  spf_aug: false
  split_file: /home/rachelgordon/mri_recon/radial-breast-ddei/data/data_split.json
  timeframes: 8
  total_spokes: 288
  train_spokes_per_frame: 36
  traj_method: get_traj
  val_split_ratio: 0.2
  weight_accelerations: false
  width: 320
dataloader:
  batch_size: 1
  max_subjects: 300
  num_random_slices: 1
  num_workers: 2
  shuffle: true
  slice_idx: 41
  slice_range_end: None
  slice_range_start: None
debugging:
  calc_step_0: true
  calc_step_0_val: true
  enable_gradient_monitoring: true
  monitoring_interval: 5
evaluation:
  chunk_overlap: 18
  chunk_size: 36
  num_samples: 15
  rescale: false
  simulated_dataset_path: /net/scratch2/rachelgordon/dro_dataset_frontpad
  val_noise_level: 0
experiment:
  cluster: DSI
  output_dir: /home/annawoodard/mri_recon/radial-breast-ddei/output
model:
  activation_checkpointing: false
  cascades: 2
  channels: 16
  checkpoint_use_reentrant: false
  encode_acceleration: false
  encode_time_index: false
  film_L: true
  film_bounded: true
  film_gain: 0.1
  film_identity_init: true
  gamma: 0.5
  kernel_size_L:
  - 3
  - 3
  - 5
  kernel_size_S:
  - 3
  - 3
  - 3
  lambda_L: 0.0025
  lambda_S: 0.05
  lambda_spatial_L: 0.05
  lambda_spatial_S: 0.05
  lambda_step: 0.1
  losses:
    adj_loss:
      weight: 1
    ei_loss:
      duration: 10000
      metric: MSE
      no_grad: false
      rotate_range: 20
      spatial_transform: all
      subsample_ratio_max: 0.95
      subsample_ratio_min: 0.7
      temporal_transform: warp
      warmup: 25
      warp_ratio_max: 0.95
      warp_ratio_min: 0.6
      weight: 0
    mc_loss:
      metric: MAE
      weight: 10
    use_ei_loss: false
  lowk_alpha: 1.0
  lowk_frac: 0.125
  name: LSFPNet
  norm: both
  num_layers: 3
  optimizer:
    b1: 0.9
    b2: 0.999
    eps: 1.0e-09
    lr: 0.0005
    name: Adam
    weight_decay: 0.0
  style_dim: 128
  svd_mode: detached_uv
  svd_noise_std: 0.001
  use_lowk_dc: false
training:
  curriculum_learning:
    enabled: false
    phases:
    - eval_num_frames: 18
      eval_spokes_per_frame: 16
      name: 'Phase 1: Moderate Accelerations'
      start_epoch: 1
      train_spokes_range:
      - 16
      - 24
      - 36
    - eval_num_frames: 36
      eval_spokes_per_frame: 8
      name: 'Phase 2: Higher Accelerations'
      start_epoch: 2
      train_spokes_range:
      - 8
      - 16
      - 24
      - 36
    - eval_num_frames: 144
      eval_spokes_per_frame: 2
      name: 'Phase 3: Ultra-High Accelerations'
      start_epoch: 3
      train_spokes_range:
      - 2
      - 4
      - 8
      - 16
      - 24
      - 36
  device: cuda
  edge_time_index_sampling: false
  epochs: 40
  multigpu: true
  plot_interval: 20
  save_interval: 1
