data:
  coils: 16
  dataset_key: kspace
  eval_frequency: 5
  eval_spokes: 2
  eval_timeframes: 144
  flip_kspace: false
  fpg: 36
  height: 320
  root_dir: /net/scratch2/rachelgordon/zf_data_192_slices/zf_kspace
  samples: 640
  slices: 192
  slices_to_eval: 1
  spf_aug: false
  split_file: /home/rachelgordon/mri_recon/radial-breast-ddei/data/data_split.json
  timeframes: 144
  total_spokes: 288
  train_spokes_per_frame: 2
  traj_method: get_traj
  val_split_ratio: 0.2
  weight_accelerations: false
  width: 320
dataloader:
  batch_size: 1
  max_subjects: 300
  num_random_slices: 4
  num_workers: 2
  shuffle: true
  slice_idx: 41
  slice_range_end: None
  slice_range_start: None
  slice_sampling_cache_dir: /net/scratch2/rachelgordon/zf_data_192_slices/slice_sampling_cache
  slice_sampling_cache_workers: 4
  slice_sampling_filter_quantile: 0.3
  slice_sampling_mode: nonenhancing
  slice_sampling_no_replacement: true
  slice_sampling_uniform_fraction: 0.6
debugging:
  calc_step_0: false
  calc_step_0_val: false
  distributed_sample_check: false
  enable_gradient_monitoring: false
  monitoring_interval: 100
  rebin_diagnostic:
    baseline_frames: 4
    enable: false
    factor: 4
    mask_fraction: 0.01
    out_subdir: rebin_diagnostics
    search_batches: 8
    start_time_index: middle
    time_index_mode: none
evaluation:
  chunk_overlap: 18
  chunk_size: 36
  deterministic_val_ei: true
  deterministic_val_ei_seed: 1234
  distributed_eval: true
  num_samples: 15
  rescale: false
  simulated_dataset_path: /net/scratch2/rachelgordon/dro_dataset_frontpad
  val_noise_level: 0.05
experiment:
  cluster: DSI
  output_dir: /net/projects2/annawoodard/experiments
  init_checkpoint: /net/projects2/annawoodard/experiments/mamba_36spf_sweepB_early_ei_archfix_lr5em4_minlf6_wu5_ep160_archtune_dconv4_2n4g/mamba_36spf_sweepB_early_ei_archfix_lr5em4_minlf6_wu5_ep160_archtune_dconv4_2n4g_best_model.pth
model:
  encode_acceleration: false
  encode_time_index: false
  losses:
    ei_loss:
      arrival_fraction: 0.15
      arrival_method: threshold
      arrival_shift_baseline_k: 2.0
      arrival_shift_max_shift: 1
      arrival_shift_percentile: 0.95
      baseline_seconds: 20.0
      duration: 40
      enh_scale_max: 1.15
      enh_scale_min: 0.85
      enh_scale_start: arrival
      metric: MSE
      no_grad: false
      pre_contrast_baseline: m_seconds
      rotate_range: 0
      spatial_transform: diffeo
      subsample_ratio_max: 0.95
      subsample_ratio_min: 0.7
      temporal_transform: arrival_shift_enh_scale
      total_seconds: 150.0
      warmup: 24
      warp_ratio_max: 0.95
      warp_ratio_min: 0.6
      weight: 10000
    mc_loss:
      metric: MAE
      weight: 1
    rebin_loss:
      baseline_frames: 4
      duration: 40
      dynamic_mask:
        clip_max: 1.0
        clip_min: 0.0
        enable: true
        fraction: 0.01
        smooth_kernel: 5
        stop_grad: true
        warmup_epochs: 10
      enable: false
      factor: 4
      metric: MAE
      offset_mode: random
      teacher_branch: lo
      teacher_stopgrad: true
      temporal_mode: temporal_difference
      time_index_mode: none
      warmup: 60
      weight: 300
    use_ei_loss: true
  mamba:
    attn_drop_rate: 0.0
    block_depth: 2
    checkpoint_use_reentrant: false
    d_state: 32
    dc_interval: 1
    dc_step: 1.0
    dc_step_max: 2.0
    dc_step_min: 0.01
    drop_path_rate: 0.0
    drop_rate: 0.0
    hidden_dim: 128
    in_chans: 2
    learnable_dc_step: true
    num_blocks: 6
    patch_norm: true
    patch_size: 4
    predict_residual: true
    relative_temporal_pos_mode: linear_quadratic
    relative_temporal_pos_scale: 1.0
    residual_scale: 1.0
    spatial_mixer_kernel_size: 3
    temporal_bidirectional: true
    temporal_d_conv: 4
    temporal_expand: 2
    token_chunk_size: 4096
    use_checkpoint: false
    use_fast_path: true
    use_relative_temporal_pos: true
    use_spatial_mixer: true
    variant: temporal
  name: MambaTemporal
  norm: both
  optimizer:
    b1: 0.9
    b2: 0.999
    eps: 1.0e-09
    lr: 2.0e-05
    name: Adam
    weight_decay: 0.0
training:
  amp:
    dtype: bf16
    enabled: true
    use_grad_scaler: false
  curriculum_learning:
    enabled: false
    phases:
    - eval_num_frames: 18
      eval_spokes_per_frame: 16
      name: 'Phase 1: Moderate Accelerations'
      start_epoch: 1
      train_spokes_range:
      - 16
      - 24
      - 36
    - eval_num_frames: 36
      eval_spokes_per_frame: 8
      name: 'Phase 2: Higher Accelerations'
      start_epoch: 2
      train_spokes_range:
      - 8
      - 16
      - 24
      - 36
    - eval_num_frames: 144
      eval_spokes_per_frame: 2
      name: 'Phase 3: Ultra-High Accelerations'
      start_epoch: 3
      train_spokes_range:
      - 2
      - 4
      - 8
      - 16
      - 24
      - 36
  ddp_find_unused_parameters: false
  device: cuda
  edge_time_index_sampling: true
  epochs: 120
  lr_schedule:
    min_lr_factor: 0.3
    warmup_epochs: 2
    warmup_mode: cosine
  multigpu: true
  plot_interval: 20
  save_interval: 5
