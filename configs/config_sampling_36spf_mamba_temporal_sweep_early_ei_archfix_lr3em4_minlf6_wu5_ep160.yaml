# 36-SPF sweep B: early EI with architecture fix and higher LR.

data:
  root_dir: "/net/scratch2/rachelgordon/zf_data_192_slices/zf_kspace"
  dataset_key: "kspace"
  split_file: "/home/rachelgordon/mri_recon/radial-breast-ddei/data/data_split.json"
  val_split_ratio: 0.2
  height: 320
  width: 320
  timeframes: 8
  total_spokes: 288
  samples: 640
  coils: 16
  eval_timeframes: 8
  eval_spokes: 36
  spf_aug: false
  weight_accelerations: false
  fpg: 36
  train_spokes_per_frame: 36
  slices: 192
  slices_to_eval: 1
  eval_frequency: 5
  flip_kspace: false
  traj_method: get_traj

experiment:
  output_dir: "/net/projects2/annawoodard/experiments"
  cluster: "DSI"

dataloader:
  batch_size: 1
  shuffle: true
  num_workers: 2
  max_subjects: 300
  num_random_slices: 4
  slice_idx: 41
  slice_range_start: None
  slice_range_end: None
  slice_sampling_mode: nonenhancing
  slice_sampling_uniform_fraction: 0.6
  slice_sampling_filter_quantile: 0.3
  slice_sampling_no_replacement: true
  slice_sampling_cache_dir: /net/scratch2/rachelgordon/zf_data_192_slices/slice_sampling_cache
  slice_sampling_cache_workers: 4

model:
  name: "MambaTemporal"
  encode_acceleration: false
  encode_time_index: false
  mamba:
    variant: "temporal"
    patch_size: 4
    in_chans: 2
    num_blocks: 6
    block_depth: 2
    hidden_dim: 128
    d_state: 16
    temporal_d_conv: 4
    temporal_expand: 2
    temporal_bidirectional: true
    token_chunk_size: 4096
    use_spatial_mixer: true
    spatial_mixer_kernel_size: 3
    predict_residual: true
    residual_scale: 1.0
    use_fast_path: true
    drop_rate: 0.0
    attn_drop_rate: 0.0
    drop_path_rate: 0.0
    patch_norm: true
    use_checkpoint: false
    checkpoint_use_reentrant: false
    dc_step: 1.0
    dc_interval: 1
  optimizer:
    name: "Adam"
    lr: 0.0003
    weight_decay: 0.0
    b1: 0.9
    b2: 0.999
    eps: 0.000000001
  losses:
    use_ei_loss: true
    mc_loss:
      weight: 1
      metric: "MAE"
    ei_loss:
      metric: "MSE"
      temporal_transform: "arrival_shift_enh_scale"
      spatial_transform: "diffeo"
      rotate_range: 0
      weight: 10000
      warmup: 8
      duration: 20
      subsample_ratio_min: 0.7
      subsample_ratio_max: 0.95
      warp_ratio_min: 0.6
      warp_ratio_max: 0.95
      arrival_shift_max_shift: 1
      arrival_shift_percentile: 0.95
      arrival_shift_baseline_k: 2.0
      arrival_method: threshold
      arrival_fraction: 0.15
      enh_scale_min: 0.85
      enh_scale_max: 1.15
      enh_scale_start: arrival
      pre_contrast_baseline: "m_seconds"
      baseline_seconds: 20.0
      total_seconds: 150.0
      no_grad: false
    rebin_loss:
      enable: false
      weight: 400
      warmup: 20
      duration: 20
      factor: 4
      metric: "MAE"
      time_index_mode: "none"
      teacher_branch: "lo"
      teacher_stopgrad: true
      offset_mode: "random"
      temporal_mode: "temporal_difference"
      baseline_frames: 4
      dynamic_mask:
        enable: true
        warmup_epochs: 4
        fraction: 0.01
        smooth_kernel: 5
        clip_min: 0.0
        clip_max: 1.0
        stop_grad: true
  norm: "both"

training:
  epochs: 160
  save_interval: 5
  plot_interval: 20
  device: "cuda"
  multigpu: true
  ddp_find_unused_parameters: false
  amp:
    enabled: true
    dtype: "bf16"
    use_grad_scaler: false
  lr_schedule:
    warmup_mode: cosine
    min_lr_factor: 0.6
    warmup_epochs: 5
  edge_time_index_sampling: false
  curriculum_learning:
    enabled: false
    phases:
      - name: "Phase 1: 36 SPF Sweep"
        start_epoch: 1
        train_spokes_range: [36]
        eval_spokes_per_frame: 36
        eval_num_frames: 8

evaluation:
  num_samples: 15
  simulated_dataset_path: "/net/scratch2/rachelgordon/dro_dataset_frontpad"
  chunk_size: 8
  chunk_overlap: 4
  rescale: false
  val_noise_level: 0.05
  deterministic_val_ei: true
  deterministic_val_ei_seed: 1234
  distributed_eval: true

debugging:
  calc_step_0: false
  calc_step_0_val: false
  distributed_sample_check: false
  enable_gradient_monitoring: false
  monitoring_interval: 100
  rebin_diagnostic:
    enable: false
    factor: 4
    start_time_index: "middle"
    search_batches: 8
    mask_fraction: 0.01
    baseline_frames: 4
    time_index_mode: "none"
    out_subdir: "rebin_diagnostics"
